services:
  - type: web
    name: zomato-ai-api
    runtime: python
    plan: free
    buildCommand: pip install -e .
    startCommand: uvicorn milestone1.phase6_api.app:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: CORS_ORIGINS
        value: https://your-app.vercel.app
